name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check linting
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Cache Q-matrices
        id: cache-q
        uses: actions/cache@v4
        with:
          path: ~/.cache/rctd
          key: q-matrices-v0.1.1

      - name: Download Q-matrices
        if: steps.cache-q.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.cache/rctd
          gh release download v0.1.1 --repo p-gueguen/rctd-py \
            --pattern q_matrices.npz --dir ~/.cache/rctd

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v -m "not slow"

      - name: Run slow integration + R concordance tests
        run: pytest tests/ -v -m slow

